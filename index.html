<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#bc2f67">
<title>資格アプリ（宅建・行政書士）</title>
<!-- ===== PWA (Issue 7) ===== -->
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="しかく勉強">
<meta name="mobile-web-app-capable" content="yes">
<!-- ===== /PWA ===== -->
<style>
/* ============================================================
   資格学習アプリ — 骨格＋ゲーミフィケーション（Issue 2）
   スマホ幅375px基準・最大480px中央寄せ・ライト配色（緑基調）
   ============================================================ */
:root{
  /* パステル配色（クリームベース×ソフトピンク×ラベンダー、アクセントはミント） */
  --pink:#f9a8c9; --pink-d:#bc2f67; --pink-sh:#8a1e49; --pink-l:#fde6f0;
  --lavender:#c4b5fd; --lavender-d:#724acf; --lavender-sh:#512bab; --lavender-l:#efe9ff;
  --mint:#8fe0cf; --mint-d:#267868; --mint-sh:#144d41; --mint-l:#e1f8f2;
  --coral:#f4a09c; --coral-d:#b13c2f; --coral-sh:#80281e; --coral-l:#fde4e1;
  --gold:#ffcf7a; --gold-d:#77500d; --gold-sh:#eebb63; --gold-l:#fff3da;
  --gray:#f1e4ea; --gray-sh:#d4c4cf;
  --ink:#5b4a56; --ink-2:#73596a; --line:#f3dbe6; --line-2:#f8ecf2;
  --bg:#fffaf3; --bg-2:#fbeef4; --card:#fffdfb;
  --shadow:0 6px 16px rgba(188,47,103,.12), 0 2px 5px rgba(114,74,207,.08);
  --radius:20px;
  --tap:48px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:"Hiragino Maru Gothic ProN","BIZ UDGothic","UD Digi Kyokasho N-R","Yu Gothic Rounded","M PLUS Rounded 1c",-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
  color:var(--ink); background:var(--bg-2);
  font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
#app{
  max-width:480px; min-height:100vh; margin:0 auto; background:var(--bg);
  display:flex; flex-direction:column; position:relative;
  box-shadow:0 0 24px rgba(188,47,103,.08);
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  min-height:var(--tap); padding:12px 20px; border-radius:999px; font-weight:800;
  font-size:16px; letter-spacing:.02em; background:var(--pink-d); color:#fff;
  box-shadow:0 3px 0 var(--pink-sh); transition:transform .05s, box-shadow .05s;
  width:100%;
}
.btn:active{transform:translateY(3px); box-shadow:0 0 0 var(--pink-sh);}
.btn.blue{background:var(--lavender-d); box-shadow:0 3px 0 var(--lavender-sh);}
.btn.blue:active{box-shadow:0 0 0 var(--lavender-sh);}
.btn.gray{background:var(--gray); color:var(--ink-2); box-shadow:0 3px 0 var(--gray-sh);}
.btn.gray:active{box-shadow:0 0 0 var(--gray-sh);}
.btn.red{background:var(--coral-d); box-shadow:0 3px 0 var(--coral-sh);}
.btn.outline{background:var(--card); color:var(--ink); border:2px solid var(--line); box-shadow:0 2px 0 var(--line);}
.btn.sm{min-height:40px; padding:8px 14px; font-size:14px; width:auto;}

/* ---------- Header ---------- */
header{
  position:sticky; top:0; z-index:30; background:var(--bg);
  border-bottom:2px solid var(--line-2); padding:8px 12px;
}
.hdr-row{display:flex; align-items:center; gap:10px; justify-content:space-between;}
.mode-toggle{display:flex; background:var(--bg-2); border-radius:999px; padding:3px; gap:2px;}
.mode-toggle button{
  border-radius:999px; padding:6px 12px; font-weight:800; font-size:13px; color:var(--ink-2);
  min-height:36px; white-space:nowrap;
}
.mode-toggle button.on{background:var(--pink-d); color:#fff; box-shadow:0 2px 0 var(--pink-sh);}
.hdr-stats{display:flex; gap:10px; align-items:center;}
.stat{display:flex; align-items:center; gap:4px; font-weight:900; font-size:15px;}
.stat.streak{color:var(--pink-d);} .stat.xp{color:var(--lavender-d);}
.stat .ic{font-size:18px;}

/* ---------- Tab content ---------- */
main{flex:1; overflow-y:auto; padding:14px 14px calc(84px + env(safe-area-inset-bottom, 0px)); -webkit-overflow-scrolling:touch;}
.screen{display:none;} .screen.on{display:block; animation:fade .18s ease;}
@keyframes fade{from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;}}
h2.title{font-size:20px; font-weight:900; margin:2px 0 12px;}
.muted{color:var(--ink-2); font-size:14px;}
.card{background:var(--card); border:2px solid var(--line-2); border-radius:var(--radius); padding:14px; margin-bottom:12px; box-shadow:var(--shadow);}
.card h3{margin:0 0 8px; font-size:16px; font-weight:900;}

/* ---------- Bottom nav ---------- */
nav.tabbar{
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:100%; max-width:480px; background:var(--bg); border-top:2px solid var(--line-2);
  display:flex; z-index:40; box-shadow:0 -6px 16px rgba(188,47,103,.07);
  padding-bottom:env(safe-area-inset-bottom, 0px); /* iOS standalone時のホームインジケータ避け */
}
nav.tabbar button{
  flex:1; min-height:var(--tap); padding:6px 2px 8px; display:flex; flex-direction:column;
  align-items:center; gap:2px; color:var(--ink-2); font-weight:700; font-size:10.5px;
}
nav.tabbar button .tic{font-size:22px; line-height:1; display:inline-block; transition:transform .15s ease;}
nav.tabbar button.on{color:var(--pink-d);}
nav.tabbar button.on .tic{transform:scale(1.15);}

/* ---------- Countdown ---------- */
.cd-wrap{display:flex; gap:10px;}
.cd{flex:1; border-radius:18px; padding:12px; color:#fff; position:relative; overflow:hidden;}
.cd.takken{background:linear-gradient(135deg,var(--lavender),var(--lavender-d));}
.cd.gyosei{background:linear-gradient(135deg,var(--pink),var(--pink-d));}
.cd .lbl{font-size:12px; font-weight:800; opacity:.95;}
.cd .num{font-size:30px; font-weight:900; line-height:1.1;}
.cd .sub{font-size:11px; opacity:.9;}
.cd.dim{opacity:.55; filter:grayscale(.3);}
.phase{background:var(--lavender-l); color:var(--lavender-d); border-radius:16px; padding:10px 12px;
  font-weight:800; font-size:13px; margin:12px 0; border:2px solid var(--lavender);}

/* ---------- Goal ring ---------- */
.goal-row{display:flex; align-items:center; gap:14px;}
.ring{width:96px; height:96px; flex:0 0 auto;}
.ring-txt{font-size:20px; font-weight:900;}
.goal-info{flex:1;}
.goal-info .big{font-size:22px; font-weight:900;}

/* ---------- Path ---------- */
.subj-head{display:flex; align-items:center; gap:8px; margin:18px 0 8px; font-weight:900; font-size:16px;}
.subj-head .bar{height:8px; flex:1; border-radius:8px; background:var(--line);}
.node-line{position:relative; padding-left:8px;}
.node{
  display:flex; align-items:center; gap:12px; padding:10px 12px; margin:8px 0;
  background:var(--card); border:2px solid var(--line-2); border-radius:18px; width:100%;
  text-align:left; min-height:var(--tap); position:relative; box-shadow:var(--shadow);
}
.node:active{transform:scale(.99);}
.node .medal{width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:20px; flex:0 0 auto; background:var(--bg-2); border:2px solid var(--line);}
.node.done .medal{background:var(--gold); border-color:var(--gold-sh);}
.node .nm{flex:1;}
.node .nm .t{font-weight:800; font-size:15px;}
.node .nm .crowns{font-size:12px; letter-spacing:1px;}
.badge{background:var(--coral-d); color:#fff; font-weight:900; font-size:12px; border-radius:20px;
  padding:2px 8px; min-width:22px; text-align:center;}
.badge.gray{background:var(--line); color:var(--ink-2);}

/* ---------- Lesson ---------- */
.lesson-top{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
.lesson-top .x{font-size:26px; color:var(--ink-2); width:36px; height:36px;}
.progbar{flex:1; height:16px; background:var(--line); border-radius:12px; overflow:hidden;}
.progbar > i{display:block; height:100%; background:var(--pink-d); border-radius:12px; transition:width .3s;}
.stem{background:var(--card); border:2px solid var(--line-2); border-radius:20px; padding:18px; font-size:18px;
  font-weight:700; min-height:120px; margin-bottom:8px; box-shadow:var(--shadow);}
.stem .tag{display:inline-block; font-size:11px; font-weight:800; color:var(--ink-2); background:var(--bg-2);
  border-radius:8px; padding:2px 8px; margin-bottom:10px;}
/* ---------- 出典バッジ・論点（r2 §6） ---------- */
.tag-row{display:flex; flex-wrap:wrap; gap:6px; align-items:center; margin-bottom:10px;}
.src-badge{display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:800;
  border-radius:999px; padding:3px 10px; line-height:1.3; white-space:nowrap;}
.src-badge.kakomon{background:var(--lavender-l); color:var(--lavender-d); border:1.5px solid var(--lavender);}
.src-badge.original{background:var(--pink-l); color:var(--pink-d); border:1.5px solid var(--pink);}
.src-badge .rev{background:var(--mint-l); color:var(--mint-d); border:1px solid var(--mint);
  border-radius:8px; padding:0 5px; font-size:10px; margin-left:2px;}
.point-line{font-size:13px; font-weight:800; color:var(--lavender-d); margin:4px 0 2px;}
.rev-note{background:var(--gold-l); color:var(--gold-d); border:1.5px solid var(--gold);
  border-radius:12px; padding:6px 10px; font-size:12px; font-weight:800; margin:6px 0;}
/* ---------- mcq（本試験形式・択一） ---------- */
.mcq-opts{display:flex; flex-direction:column; gap:8px; margin-top:12px;}
.mcq-opt{display:flex; gap:10px; align-items:flex-start; text-align:left; width:100%;
  background:var(--card); border:2px solid var(--line-2); border-radius:16px; padding:12px 14px;
  min-height:var(--tap); font-size:15px; font-weight:700; box-shadow:var(--shadow); color:var(--ink);}
.mcq-opt:active{transform:scale(.99);}
.mcq-opt .no{flex:0 0 auto; width:26px; height:26px; border-radius:50%; background:var(--bg-2);
  display:flex; align-items:center; justify-content:center; font-weight:900; font-size:14px; color:var(--ink-2);}
.mcq-opt.correct{background:var(--mint-l); border-color:var(--mint); color:var(--mint-d);}
.mcq-opt.correct .no{background:var(--mint-d); color:#fff;}
.mcq-opt.wrong{background:var(--coral-l); border-color:var(--coral); color:var(--coral-d);}
.mcq-opt.wrong .no{background:var(--coral-d); color:#fff;}
.mcq-opt.dim{opacity:.72;}
.mcq-opt .oexp{display:block; font-size:12px; font-weight:600; color:var(--ink-2); margin-top:4px;}
.ox-row{display:flex; gap:10px; margin-top:12px;}
.ox-row .btn{font-size:18px;}
.ox-o{background:var(--lavender-l); color:var(--lavender-d); border:2px solid var(--lavender); box-shadow:0 3px 0 var(--lavender);}
.ox-x{background:var(--coral-l); color:var(--coral-d); border:2px solid var(--coral); box-shadow:0 3px 0 var(--coral);}
.feedback{position:fixed; left:50%; transform:translateX(-50%); bottom:0; width:100%; max-width:480px;
  padding:16px 16px 22px; z-index:50; border-top-left-radius:24px; border-top-right-radius:24px;
  animation:slideup .2s ease; box-shadow:0 -8px 20px rgba(91,74,86,.12);}
@keyframes slideup{from{transform:translate(-50%,100%);} to{transform:translate(-50%,0);}}
.feedback.ok{background:var(--mint-l);} .feedback.ng{background:var(--coral-l);}
.feedback .head{font-weight:900; font-size:18px; display:flex; align-items:center; gap:8px;}
.feedback.ok .head{color:var(--mint-d);} .feedback.ng .head{color:var(--coral-d);}
.feedback .exp{font-size:14px; margin:6px 0 12px; color:var(--ink);}

/* ---------- Complete ---------- */
.complete{text-align:center; padding:20px 6px; position:relative; overflow:hidden;}
.complete h2{font-size:24px; font-weight:900; margin:12px 0 4px;}
.xp-pill{display:inline-flex; align-items:center; gap:6px; background:var(--gold); color:var(--gold-d);
  font-weight:900; padding:8px 16px; border-radius:999px; font-size:18px; margin:8px 0;}
.stat-grid{display:flex; gap:10px; margin:16px 0;}
.stat-grid .c{flex:1; background:var(--bg-2); border-radius:16px; padding:12px 6px;}
.stat-grid .c .v{font-size:20px; font-weight:900;} .stat-grid .c .l{font-size:11px; color:var(--ink-2);}

/* ---------- Flash / Kijutsu ---------- */
.seg{display:flex; background:var(--bg-2); border-radius:999px; padding:4px; margin-bottom:12px;}
.seg button{flex:1; min-height:40px; border-radius:999px; font-weight:800; color:var(--ink-2);}
.seg button.on{background:var(--card); color:var(--ink); box-shadow:var(--shadow);}
.flip{background:var(--card); border:2px solid var(--line-2); border-radius:20px; padding:22px; min-height:180px;
  display:flex; flex-direction:column; justify-content:center; text-align:center; font-size:18px; font-weight:700; box-shadow:var(--shadow);}
.flip .side-lbl{font-size:11px; font-weight:800; color:var(--ink-2); margin-bottom:10px;}
.kw-row{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-top:10px;}
.kw{background:var(--bg-2); border-radius:10px; padding:6px 10px; font-size:14px; font-weight:800; color:var(--ink-2);}
.grade-row{display:flex; gap:8px; margin-top:12px;}
.grade-row .btn{font-size:20px;}
.g-o{background:var(--mint-d); box-shadow:0 3px 0 var(--mint-sh);}
.g-t{background:var(--gold); color:var(--gold-d); box-shadow:0 3px 0 var(--gold-sh);}
.g-x{background:var(--coral-d); box-shadow:0 3px 0 var(--coral-sh);}

/* ---------- Progress ---------- */
.bar-line{display:flex; align-items:center; gap:8px; margin:8px 0;}
.bar-line .lb{width:96px; font-size:13px; font-weight:700;}
.bar-line .track{flex:1; height:14px; background:var(--line); border-radius:8px; overflow:hidden;}
.bar-line .track > i{display:block; height:100%; background:var(--mint-d); border-radius:8px;}
.bar-line .pc{width:42px; text-align:right; font-weight:800; font-size:13px;}
.crown-dist{display:flex; gap:6px; margin-top:8px;}
.crown-dist .cc{flex:1; text-align:center; background:var(--bg-2); border-radius:12px; padding:8px 2px;}
.crown-dist .cc .n{font-size:18px; font-weight:900;} .crown-dist .cc .l{font-size:10px; color:var(--ink-2);}
.io-row{display:flex; gap:8px;}

/* ---------- Modal / diag ---------- */
.overlay{position:fixed; inset:0; background:rgba(91,74,86,.38); z-index:60; display:flex; align-items:center;
  justify-content:center; padding:20px;}
.modal{background:var(--card); border-radius:24px; padding:22px; max-width:420px; width:100%; text-align:center; box-shadow:var(--shadow);}
.modal h3{margin:10px 0 6px; font-size:20px; font-weight:900;}
.err-banner{background:var(--coral-l); color:var(--coral-d); border:2px solid var(--coral); border-radius:14px;
  padding:10px 12px; font-size:13px; font-weight:700; margin-bottom:12px;}
.toast{position:fixed; left:50%; transform:translateX(-50%); bottom:96px; background:var(--ink); color:#fff;
  padding:10px 18px; border-radius:999px; font-weight:800; font-size:14px; z-index:70; animation:fade .2s;}
.empty{text-align:center; color:var(--ink-2); padding:30px 10px; font-size:14px;}
.cat-say{background:var(--card); border:2px solid var(--line); border-radius:16px; padding:8px 12px; display:inline-block;
  font-weight:800; font-size:14px; position:relative; margin-top:8px; box-shadow:var(--shadow);}
.pill-opts{display:flex; flex-direction:column; gap:10px; margin-top:12px;}
label.chk{display:flex; align-items:center; gap:10px; font-weight:700; padding:8px 0;}
label.chk input{width:22px; height:22px; accent-color:var(--pink-d);}

/* ---------- 演出: レッスン完了の紙吹雪/ハート ---------- */
.confetti-wrap{position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:1;}
.confetti-piece{position:absolute; top:-10%; font-size:20px; opacity:0; animation:confetti-fall 1.6s ease-in forwards;
  will-change:transform, opacity;}
@keyframes confetti-fall{
  0%{opacity:0; transform:translateY(0) rotate(0deg) scale(.6);}
  10%{opacity:1;}
  100%{opacity:0; transform:translateY(220px) rotate(200deg) scale(1);}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hdr-row">
      <div class="mode-toggle" id="modeToggle">
        <button data-mode="gyosei">行政書士</button>
        <button data-mode="takken">宅建</button>
      </div>
      <div class="hdr-stats">
        <div class="stat streak"><span class="ic">💗</span><span id="hStreak">0</span></div>
        <div class="stat xp"><span class="ic">✨</span><span id="hXp">0</span></div>
      </div>
    </div>
  </header>

  <main>
    <section class="screen" id="scr-today"></section>
    <section class="screen" id="scr-path"></section>
    <section class="screen" id="scr-lesson"></section>
    <section class="screen" id="scr-cards"></section>
    <section class="screen" id="scr-progress"></section>
  </main>

  <nav class="tabbar" id="tabbar">
    <button data-tab="today"><span class="tic">🏡</span>今日</button>
    <button data-tab="path"><span class="tic">🌈</span>パス</button>
    <button data-tab="lesson"><span class="tic">🖍️</span>レッスン</button>
    <button data-tab="cards"><span class="tic">🎴</span>記述・暗記</button>
    <button data-tab="progress"><span class="tic">🌱</span>進捗</button>
  </nav>
</div>

<script>
"use strict";
/* ============================================================================
   window.App = { Data, Store, SRS, UI, Sim }  — SPEC §5 モジュール境界
   ============================================================================ */
window.App = (function(){

/* ---------------------------------------------------------------------------
   定数・単元カタログ（§2 正準リスト）。data/*.json が無くてもUIが成立するよう
   単元メタはコードに内蔵。items は fetch 結果があれば使い、無ければ空で動く。
   --------------------------------------------------------------------------- */
const EXAM = {

};
const PHASE_SWITCH = '2026-10-19'; // この日以降は行政書士全振り

// unit: {id,label,subject,subjectLabel,exam}
const UNITS = [
  // 共通（民法・shared）

  ['minpo-fuhokoui','不法行為','minpo','民法','shared'],
  ['minpo-shinzoku','親族・相続','minpo','民法','shared'],
  // 行政書士
  ['kenpo-jinken','人権','kenpo','憲法','gyosei'],
  ['kenpo-tochi','統治','kenpo','憲法','gyosei'],
  ['gh-soron','行政法総論','gyoseiho','行政法','gyosei'],
  ['gh-tetsuzuki','行政手続法','gyoseiho','行政法','gyosei'],
  ['gh-fufuku','行政不服審査法','gyoseiho','行政法','gyosei'],
  ['gh-sosho','行政事件訴訟法','gyoseiho','行政法','gyosei'],
  ['gh-baisho','国家賠償・損失補償','gyoseiho','行政法','gyosei'],
  ['gh-chiho','地方自治法','gyoseiho','行政法','gyosei'],
  ['shoho-kaisha','商法・会社法','shoho','商法','gyosei'],

  ['kiso-ippan','政治経済社会','kisochishiki','基礎知識','gyosei'],

  ['gyoho-menkyo','免許・宅建士','takkengyoho','宅建業法','takken'],

  ['gyoho-torihiki','媒介・重説・37条','takkengyoho','宅建業法','takken'],

/* ---------------------------------------------------------------------------
   日付ユーティリティ
   --------------------------------------------------------------------------- */
function todayISO(){ const d=new Date(); return isoOf(d); }
function isoOf(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function addDays(iso,n){ const d=new Date(iso+'T00:00:00'); d.setDate(d.getDate()+n); return isoOf(d); }
function daysBetween(a,b){ // b - a （日数）
  const da=new Date(a+'T00:00:00'), db=new Date(b+'T00:00:00');
  return Math.round((db-da)/86400000);
}

/* ===========================================================================
   App.Store — localStorage層（§4 キー契約  namespace shikaku.v1.）
   =========================================================================== */
const NS='shikaku.v1.';
const Store=(function(){
  const KEYS=['srs','profile','settings'];
  function read(k,def){ try{ const v=localStorage.getItem(NS+k); return v?JSON.parse(v):def; }catch(e){ return def; } }
  function write(k,v){ try{ localStorage.setItem(NS+k, JSON.stringify(v)); }catch(e){} }
  function defProfile(){ return {
    xp:0, xpToday:0, todayDate:todayISO(), streak:0, lastActiveDate:null,
    dailyGoalXP:50, mode:'gyosei', diagDone:{gyosei:false,takken:false}, xpHistory:{}
  };}
  function defSettings(){ return { sound:true, kindFilter:'all' }; }
  let _srs=read('srs',{});
  let _profile=Object.assign(defProfile(), read('profile',{}));
  let _settings=Object.assign(defSettings(), read('settings',{}));
  // shikaku.v1.recent — r2で追加した唯一の新規キー（出題リングバッファ、最大60件）
  // 進捗ではなく再出題抑制用の一時状態。既存キー(srs/profile/settings)の構造は不変更。
  let _recent=read('recent',[]);
  if(!Array.isArray(_recent)) _recent=[];
  return {
    srs(){ return _srs; },
    saveSrs(){ write('srs',_srs); },
    profile(){ return _profile; },
    saveProfile(){ write('profile',_profile); },
    settings(){ return _settings; },
    saveSettings(){ write('settings',_settings); },
    recent(){ return _recent; },
    saveRecent(){ write('recent',_recent); },
    // 日付ロールオーバー：日が変わったらxpTodayリセット・ストリーク維持/切れ判定
    rollDate(){
      const t=todayISO(), p=_profile;
      if(p.todayDate!==t){
        // 前日活動なし判定：lastActiveDate が「昨日」でなければストリーク切れ
        if(p.lastActiveDate){
          const gap=daysBetween(p.lastActiveDate,t);
          if(gap>=2) p.streak=0; // 1日以上空いた
        }
        p.xpToday=0; p.todayDate=t;
        this.saveProfile();
      }
    },
    exportAll(){
      const dump={_ns:NS,_exportedAt:new Date().toISOString()};
      KEYS.forEach(k=>{ dump[k]=read(k,null); });
      return dump;
    },
    importAll(obj){
      KEYS.forEach(k=>{ if(obj && obj[k]!=null) write(k,obj[k]); });
      _srs=read('srs',{}); _profile=Object.assign(defProfile(),read('profile',{}));
      _settings=Object.assign(defSettings(),read('settings',{}));
    }
  };
})();

/* ===========================================================================
   App.Data — 問題データ（fetch）。3本ロード、失敗は握りつぶさず記録。
   =========================================================================== */
const Data=(function(){
  let items=[], byId={}, byUnit={}, mcqItems=[], loadErrors=[];
  function index(){
    byId={}; byUnit={};
    items.forEach(it=>{
      if(!it||!it.id) return;
      byId[it.id]=it;
      (byUnit[it.unit] = byUnit[it.unit]||[]).push(it);
    });
    // mcqは byId にだけ登録（SRS.grade/Data.get 用）。all()/ofUnit()/unitCrown には混ぜず
    // 既存の単元crown・due計算・診断母集団を一切変えない（進捗保護の最優先方針）。
    mcqItems.forEach(it=>{ if(it && it.id) byId[it.id]=it; });
  }
  async function loadOne(file){
    try{
      const r=await fetch('data/'+file, {cache:'no-store'});
      if(!r.ok) throw new Error('HTTP '+r.status);
      const j=await r.json();
      if(!j||!Array.isArray(j.items)) throw new Error('items配列なし');
      return j.items;
    }catch(e){
      loadErrors.push(file+': '+e.message);
      return [];
    }
  }
  async function load(){
    loadErrors=[]; items=[]; mcqItems=[];
    const files=['minpo.json','gyosei.json','takken.json'];
    const res=await Promise.all(files.map(loadOne));
    res.forEach(arr=>{ if(Array.isArray(arr)) items=items.concat(arr); });
    // mcqは別ファイル・別配列（root {version:2, items:[...]}）。欠落しても他をブロックしない。
    const mcqArr=await loadOne('mcq.json');
    mcqItems=Array.isArray(mcqArr)?mcqArr.filter(i=>i&&i.type==='mcq'):[];
    index();
    return { count:items.length, mcqCount:mcqItems.length, errors:loadErrors.slice() };
  }
  return {
    load,
    all(){ return items; },
    allMcq(){ return mcqItems; },
    errors(){ return loadErrors.slice(); },
    get(id){ return byId[id]; },
    ofUnit(id){ return byUnit[id]||[]; },
    ofUnitType(id,type){ return (byUnit[id]||[]).filter(i=>i.type===type); },
    // モードに属する type=choice の item 全部
    choicesForMode(mode){
      const ids=new Set(unitsForMode(mode).map(u=>u.id));
      return items.filter(i=>i.type==='choice' && ids.has(i.unit));
    },
    // モードに属する mcq（別配列から）
    mcqForMode(mode){
      const ids=new Set(unitsForMode(mode).map(u=>u.id));
      return mcqItems.filter(i=>ids.has(i.unit));
    },
    forMode(mode, type){
      const ids=new Set(unitsForMode(mode).map(u=>u.id));
      return items.filter(i=>ids.has(i.unit) && (!type||i.type===type));
    }
  };
})();

/* ===========================================================================
   ┌───────────────────────────────────────────────────────────────────────┐
   │  App.SRS  ——  スタブ実装（Issue 2）                                       │
   │  ★ Issue 3 が本実装に差し替える区画。この BEGIN/END の間だけを置換する。   │
   │  固定インターフェース（§5）:                                              │
   │    init(items,todayISO) / dueItems(mode,todayISO) / grade(id,ok,todayISO) │
   │    unitCrown(unitId) / intervals(todayISO,mode)                          │
   │  スタブ方針: 素朴なLeitner。box1-5, due管理, lap5, seen/correct/wrong。    │
   └───────────────────────────────────────────────────────────────────────┘
   =========================================================================== */
// ===== SRS-STUB BEGIN (Issue3差し替え対象) =====
// ── Issue3: Leitner 5箱 本実装 ────────────────────────────────────────────
//   箱間隔[1,3,7,14,30]日。正解=昇格（箱5留まりlap5++, lap5>=2でマスター）。
//   不正解=箱1へ降格＋lap5リセット。記述の△=partial(正解扱い・昇格なし・due更新)。
//   直前期(現モード試験21日前〜)は間隔×0.5切上げ最低1日。
//   堅牢化: 未知itemId無視／破損エントリは該当のみ再初期化／日付逆行でも非クラッシュ。
const SRS=(function(){
  const BASE=[1,3,7,14,30];
  function store(){ return Store.srs(); }
  function freshRec(due){ return { box:1, due:due, lap5:0, seen:0, correct:0, wrong:0 }; }
  // レコード健全性検査（localStorage破損検知）
  function isValid(r){
    return !!r && typeof r==='object'
      && Number.isInteger(r.box) && r.box>=1 && r.box<=5
      && typeof r.due==='string' && /^\d{4}-\d{2}-\d{2}$/.test(r.due)
      && typeof r.lap5==='number' && isFinite(r.lap5) && r.lap5>=0
      && typeof r.seen==='number' && isFinite(r.seen)
      && typeof r.correct==='number' && isFinite(r.correct)
      && typeof r.wrong==='number' && isFinite(r.wrong);
  }
  // 破損/未生成なら該当エントリのみ再初期化して返す
  function rec(id, today){
    const s=store();
    if(!isValid(s[id])) s[id]=freshRec(today||todayISO());
    return s[id];
  }
  // 直前期(現モード試験の21日前〜当日)は間隔×0.5切上げ・最低1日
  function intervals(today, mode){
    const exam=EXAM[mode]?EXAM[mode].date:null;
    if(exam){
      const d=daysBetween(today,exam);      // 試験まで残り日数（逆行で負でも安全）
      if(d>=0 && d<=21) return BASE.map(n=>Math.max(1,Math.ceil(n*0.5)));
    }
    return BASE.slice();
  }
  // box(1-5)→due文字列
  function nextDue(iv, box, today){
    const step=iv[Math.min(iv.length-1, Math.max(0, box-1))];
    return addDays(today, step);
  }
  return {
    // items群に対しSRSレコードを遅延生成（既存の正常レコードは保持、破損は再初期化）
    init(items, today){
      today=today||todayISO();
      const s=store();
      (items||[]).forEach(it=>{
        if(it && it.id && !isValid(s[it.id])) s[it.id]=freshRec(today);
      });
      Store.saveSrs();
    },
    // modeに属するunitの、due到来かつ未マスター(lap5<2)なchoice item id[]
    //   並び: 期限超過が古い順 → 箱が低い順 → 同条件はシャッフル
    //   shared(minpo-*)は unitsForMode により両モードで自然に含まれる
    dueItems(mode, today){
      today=today||todayISO();
      const s=store();
      const ids=new Set(unitsForMode(mode).map(u=>u.id));
      const arr=Data.all()
        .filter(it=>it && it.type==='choice' && ids.has(it.unit))
        .map(it=>({ id:it.id, r:s[it.id], k:Math.random() }))
        .filter(o=>isValid(o.r) && o.r.lap5<2 && o.r.due<=today);
      arr.sort((a,b)=>{
        if(a.r.due!==b.r.due) return a.r.due<b.r.due?-1:1; // 古いdueが先
        if(a.r.box!==b.r.box) return a.r.box-b.r.box;       // 箱が低い順
        return a.k-b.k;                                     // 同条件はシャッフル
      });
      return arr.map(o=>o.id);
    },
    // 採点：昇格/降格・due再計算・lap5更新。
    //   result === true      → 正解: 昇格（箱5はlap5++で留まる, lap5>=2でマスター）
    //   result === "partial" → △: 正解扱い・昇格なし・箱維持・dueのみ更新
    //   result === false     → 不正解: 箱1へ降格・lap5リセット
    grade(id, result, today){
      today=today||todayISO();
      const it=Data.get(id);
      if(!it) return null;                     // 未知itemIdは無視
      const iv=intervals(today, modeOfUnit(it.unit));
      const r=rec(id, today);
      r.seen++;
      if(result==='partial'){
        r.correct++;                           // 正解扱いだが昇格なし・箱維持
      }else if(result){
        r.correct++;
        if(r.box>=5) r.lap5=Math.min(2,(r.lap5||0)+1); // 箱5留まり・lap5++
        else r.box=Math.min(5, r.box+1);               // 昇格
      }else{
        r.wrong++;
        r.box=1;                               // 箱1へ降格
        r.lap5=0;                              // lap5リセット
      }
      r.due=nextDue(iv, r.box, today);
      Store.saveSrs();
      return r;
    },
    // 診断テスト飛び級：unit内itemを box3 / due=+7d で初期化（既存カウンタは温存）
    seedUnit(unitId, today){
      today=today||todayISO();
      const s=store();
      const due=addDays(today,7);
      Data.ofUnit(unitId).forEach(it=>{
        const cur=isValid(s[it.id])?s[it.id]:null;
        if(!cur || cur.box<3){
          s[it.id]={ box:3, due:due, lap5:0,
            seen: cur?cur.seen:0, correct: cur?cur.correct:0, wrong: cur?cur.wrong:0 };
        }
      });
      Store.saveSrs();
    },
    // 単元の王冠(0-5) = floor(5 * Σmin(box+lap5,7)/7 / N)（破損/未生成はprog0）
    unitCrown(unitId){
      const s=store();
      const list=Data.ofUnit(unitId);
      if(!list.length) return 0;
      let sum=0;
      list.forEach(it=>{
        const r=s[it.id];
        const prog = isValid(r) ? Math.min(r.box+r.lap5,7) : 0;
        sum += prog/7;
      });
      return Math.floor(5*sum/list.length);
    },
    intervals,
    // due溜まり数（表示用）
    dueCountUnit(unitId, today){
      today=today||todayISO();
      const s=store();
      return Data.ofUnit(unitId).filter(it=>{ const r=s[it.id]; return isValid(r) && r.seen>0 && r.lap5<2 && r.due<=today; }).length;
    }
  };
})();
// helper: unit属するmode（sharedは現在のprofile.modeに寄せる）
function modeOfUnit(unitId){
  const u=UNIT_BY_ID[unitId];
  if(!u) return Store.profile().mode;
  if(u.exam==='gyosei') return 'gyosei';
  if(u.exam==='takken') return 'takken';
  return Store.profile().mode; // shared
}

// 出題ロジック共通の配列シャッフル（UI内shuffleとは別スコープ・非破壊）
function shuffleArr(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

/* ===========================================================================
   App.Picker — 出題キュー構築の集約（r2 §5）。SRSは不変更、ここは選抜のみ。
     - due復習を先頭 → 未出題(seen==0)を重み付けサンプリングで補充
     - クールダウン(直近2日以内にseenした非due項目を除外)
     - recentリングバッファ(shikaku.v1.recent, 最大60)でセッション内/連続レッスンの重複防止
     - kindフィルタ(all|kakomon|original) を通常出題にのみ適用（due/誤答復習は保護のため非適用）
   build()は純粋（recentを書き換えない）。実際に開始した時だけ record() で記録する。
   =========================================================================== */
const Picker=(function(){
  const MAX_RECENT=60;         // リングバッファ上限
  const SESSION_NOREPEAT=30;   // 直近この件数は再出題しない
  const COOLDOWN_DAYS=2;       // 直近2日以内にseenした非due項目は除外
  // 試験重要度ウェイト（subject単位）
  const WEIGHTS={
    takken:{ takkengyoho:1.5, kenri:1.2, minpo:1.2, seigen:1.0, zeisonota:0.8 },
    gyosei:{ gyoseiho:1.5, minpo:1.3, kenpo:0.9, shoho:0.6, kisochishiki:0.9 }
  };
  function arr(){ const a=Store.recent(); return Array.isArray(a)?a:[]; }
  // 直近SESSION_NOREPEAT件に含まれるか（連続レッスンの重複防止）
  function inNoRepeat(id){
    const a=arr(), start=Math.max(0,a.length-SESSION_NOREPEAT);
    for(let i=a.length-1;i>=start;i--) if(a[i] && a[i].id===id) return true;
    return false;
  }
  // 直近COOLDOWN_DAYS日以内に出題済みか（最新の記録日で判定）
  function cooledDown(id, today){
    const a=arr();
    for(let i=a.length-1;i>=0;i--){
      if(a[i] && a[i].id===id){
        const g=daysBetween(a[i].d, today);
        return (g>=0 && g<COOLDOWN_DAYS); // 今日/昨日に出したものは除外
      }
    }
    return false;
  }
  // 実際に開始したキューだけを記録（重複除去しつつpush、上限でシフト）
  function record(ids, today){
    today=today||todayISO();
    const a=arr();
    (ids||[]).forEach(id=>{ if(id) a.push({id:id, d:today}); });
    while(a.length>MAX_RECENT) a.shift();
    Store.saveRecent();
  }
  function kindFilter(){ const f=Store.settings().kindFilter; return f||'all'; }
  // 単元の弱さ（crown低い×due溜まり多いほど大）
  function unitWeak(unitId, today){
    let crown=0, due=0;
    try{ crown=SRS.unitCrown(unitId); due=SRS.dueCountUnit(unitId,today); }catch(e){}
    return (5-crown) + Math.min(6,due)*0.5;
  }
  function weightOf(it, mode, today){
    const u=UNIT_BY_ID[it.unit];
    const base=(WEIGHTS[mode]||{})[u?u.subject:'']||1.0;
    return Math.max(0.05, base*(1 + unitWeak(it.unit,today)*0.4));
  }
  // 重み付き非復元サンプリング
  function weightedSample(cands, n, mode, today){
    const pool=cands.slice(), out=[];
    while(out.length<n && pool.length){
      let total=0; const ws=pool.map(it=>{ const w=weightOf(it,mode,today); total+=w; return w; });
      let r=Math.random()*total, k=0;
      while(k<pool.length-1 && (r-=ws[k])>0) k++;
      out.push(pool.splice(k,1)[0]);
    }
    return out;
  }
  // kindフィルタ適用（メタ欠落=kind未定義は、絞り込み時に空になったら無視して全件へフォールバック）
  function applyKind(cands, filter){
    if(!filter || filter==='all') return cands;
    const f=cands.filter(it=>it.kind===filter);
    return f.length ? f : cands; // フォールバック: 対象0なら絞らない（データ班未完了でもアプリ成立）
  }
  /* build(mode, opts)
     opts: { count=10, unit, includeDue=true, weighted=true, seenOk=false,
             applyKindFilter=true, applyCooldown=true }
     返り値: { queue, dueCount, newCount, realDue, kijutsu } */
  function build(mode, opts){
    opts=opts||{};
    const today=todayISO();
    const count=opts.count||10;
    const s=Store.srs();
    const filter = (opts.applyKindFilter===false) ? 'all' : kindFilter();
    const unitScope = opts.unit ? new Set([opts.unit]) : new Set(unitsForMode(mode).map(u=>u.id));
    const inScope = it => it && it.type==='choice' && unitScope.has(it.unit);

    const queue=[]; const dueSet=new Set();
    // 1) due復習（kindフィルタ非適用＝意図的再出題の保護。ただし連続重複はNoRepeatで避ける）
    if(opts.includeDue!==false){
      let due=SRS.dueItems(mode,today).filter(id=>{ const it=Data.get(id); return it && unitScope.has(it.unit); });
      due=due.filter(id=>!inNoRepeat(id));
      for(const id of due){ if(queue.length>=count) break; if(!dueSet.has(id)){ queue.push(id); dueSet.add(id); } }
    }
    // 2) 未出題(seen==0)を重み付けサンプリングで補充
    if(queue.length<count){
      let cands=Data.all().filter(it=>{
        if(!inScope(it) || dueSet.has(it.id)) return false;
        const r=s[it.id];
        if(!opts.seenOk && r && r.seen>0) return false;    // 通常は未出題のみ
        if(inNoRepeat(it.id)) return false;
        if(opts.applyCooldown!==false && cooledDown(it.id, today)) return false;
        return true;
      });
      cands=applyKind(cands, filter);
      const need=count-queue.length;
      const picked = (opts.weighted===false) ? shuffleArr(cands).slice(0,need) : weightedSample(cands, need, mode, today);
      picked.forEach(it=>queue.push(it.id));
    }
    // 3) まだ足りなければ（単元学習等で未出題が枯渇）seen済み非due項目でフォールバック補充
    if(queue.length<count){
      let extra=Data.all().filter(it=> inScope(it) && queue.indexOf(it.id)<0 && !inNoRepeat(it.id));
      extra=applyKind(extra, filter);
      extra=shuffleArr(extra);
      for(const it of extra){ if(queue.length>=count) break; queue.push(it.id); }
    }
    const finalQ=queue.slice(0,count);
    const realDue=(opts.includeDue!==false)
      ? SRS.dueItems(mode,today).filter(id=>{ const r=s[id]; return r && r.seen>0; }).length : 0;
    const kijutsu=(mode==='gyosei') ? Math.min(3, Data.forMode('gyosei','kijutsu').length) : 0;
    return { queue:finalQ, dueCount:dueSet.size, newCount:finalQ.length-dueSet.size, realDue, kijutsu };
  }
  // mcq用の簡易セット構築（5問・kindフィルタ適用・recentは開始時にrecordで記録）
  function buildMcq(mode, count){
    count=count||5;
    let cands=Data.mcqForMode(mode).filter(it=>!inNoRepeat(it.id));
    cands=applyKind(cands, kindFilter());
    if(cands.length<count){ // 足りなければNoRepeat無視で補う
      const more=Data.mcqForMode(mode);
      cands=applyKind(more, kindFilter());
    }
    return shuffleArr(cands).slice(0,count).map(it=>it.id);
  }
  return { build, buildMcq, record,
           // テスト用の内部フック
           _inNoRepeat:inNoRepeat, _cooledDown:cooledDown, _weightOf:weightOf, _weightedSample:weightedSample,
           _MAX_RECENT:MAX_RECENT, _SESSION_NOREPEAT:SESSION_NOREPEAT, _COOLDOWN_DAYS:COOLDOWN_DAYS, _WEIGHTS:WEIGHTS };
})();

/* ===========================================================================
   Audio — WebAudioで短い正解/不正解音（settings.sound で ON/OFF）
   =========================================================================== */
const Sound=(function(){
  let ctx=null;
  function ac(){ if(!ctx){ try{ ctx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ctx; }
  function tone(freq,dur,type,when,gain){
    const c=ac(); if(!c) return;
    const o=c.createOscillator(), g=c.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.value=gain||0.12;
    o.connect(g); g.connect(c.destination);
    const t=c.currentTime+(when||0);
    o.start(t); g.gain.setValueAtTime(g.gain.value,t);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.stop(t+dur);
  }
  function on(){ return Store.settings().sound; }
  return {
    correct(){ if(!on())return; tone(660,0.12,'triangle',0); tone(990,0.16,'triangle',0.09); },
    wrong(){ if(!on())return; tone(220,0.22,'sawtooth',0,0.09); },
    fanfare(){ if(!on())return; [523,659,784,1046].forEach((f,i)=>tone(f,0.18,'triangle',i*0.1)); },
    resume(){ const c=ac(); if(c&&c.state==='suspended') c.resume(); }
  };
})();

  function answerMcq(sel, it){
    if(mcq.locked) return; mcq.locked=true;
    const correct = (sel===it.answerIndex);
    if(correct) mcq.correct++;
    // SRS接続（mcq=1項目1箱）。XP: 正解+4/不正解+1
    SRS.grade(it.id, correct, todayISO());
    addXP(correct?4:1);
    if(correct) Sound.correct(); else Sound.wrong();
    // 全肢の解説を表示（正解肢=緑、選んだ誤肢=赤）
    const wrap=$('#mcqOpts');
    wrap.querySelectorAll('.mcq-opt').forEach((el,i)=>{
      el.onclick=null;
      const ex=(it.optExplanations&&it.optExplanations[i]!=null)?'<span class="oexp">'+esc(it.optExplanations[i])+'</span>':'';
      el.insertAdjacentHTML('beforeend', ex);
      if(i===it.answerIndex) el.classList.add('correct');
      else if(i===sel) el.classList.add('wrong');
      else el.classList.add('dim');
    });
    const scr=$('#scr-lesson');
    scr.insertAdjacentHTML('beforeend',
      (it.point?'<div class="point-line" style="margin-top:12px">論点: '+esc(it.point)+'</div>':'')+
      '<div class="card" style="margin-top:'+(it.point?'4px':'12px')+'"><div class="head" style="font-weight:900;color:'+(correct?'var(--mint-d)':'var(--coral-d)')+'">'+(correct?'✅ 正解！':'❌ 不正解')+'</div>'+
        (it.explanation?'<div class="exp" style="margin-top:6px">'+esc(it.explanation)+'</div>':'')+
        revNote(it)+
        '<button class="btn'+(correct?' blue':' red')+'" id="mcqNext" style="margin-top:10px">つづける</button></div>');
    $('#mcqNext').onclick=()=>{ mcq.idx++; renderMcqQuestion(); };
    scr.scrollTop=scr.scrollHeight;

  function startOption(opt){
    const m=mode(), t=todayISO(), s=Store.srs();
    let pool=[];
    if(opt==='weak'){
      // 弱点：Pickerの重み付け（弱点unit×試験重要度）＋kindフィルタ＋recent。
      pool=Picker.build(m, { count:10 }).queue;
    }else if(opt==='wrong'){
      // 「間違えた肢だけ」＝意図的再出題。kindフィルタもrecordも掛けない（保護）。
      pool=shuffle(Data.choicesForMode(m).filter(i=>{ const r=s[i.id]; return r && r.wrong>0; }).map(i=>i.id));
    }else if(opt==='due'){
      // 期限復習＝意図的再出題。kindフィルタ非適用。
      pool=SRS.dueItems(m,t);
    }else{
      // ランダム10肢：kindフィルタ適用・重み無し（未出題優先せずseen可）
      pool=Picker.build(m, { count:10, includeDue:false, weighted:false, seenOk:true }).queue;
    }
    if(!pool.length){ toast('対象の肢がありません'); return; }
    startLesson(pool.slice(0,10), {label:{weak:'弱点',wrong:'復習(誤答)',due:'期限復習',random:'ランダム'}[opt]});
  }

  /* ---------------- レッスンフロー ---------------- */
  function startLesson(ids, meta){
    Sound.resume();
    lesson={ queue:ids.slice(), idx:0, correct:0, answers:[], meta:meta||{}, isDiag:false };
    Picker.record(ids, todayISO()); // 実出題のみrecentに記録（連続レッスンの重複防止）
    go('lesson');
    renderQuestion();
  }
  function renderQuestion(){
    const scr=$('#scr-lesson');
    if(lesson.idx>=lesson.queue.length){ return renderComplete(); }
    const id=lesson.queue[lesson.idx];
    const it=Data.get(id);
    const total=lesson.queue.length;
    const pct=Math.round(100*lesson.idx/total);
    if(!it){ lesson.idx++; return renderQuestion(); }
    lesson.locked=false; // 各問の頭で解錠（連打・二重採点ガード）
    scr.innerHTML=
      '<div class="lesson-top"><button class="x" id="lesX">✕</button>'+
        '<div class="progbar"><i style="width:'+pct+'%"></i></div>'+
        '<div class="muted">'+(lesson.idx+1)+'/'+total+'</div></div>'+
      '<div class="muted" style="margin-bottom:6px">'+(lesson.isDiag?'診断テスト':'この肢は正しい？')+'</div>'+
      '<div class="stem"><div class="tag-row"><span class="tag">'+(UNIT_BY_ID[it.unit]?UNIT_BY_ID[it.unit].label:it.unit)+'</span>'+sourceBadge(it)+'</div>'+esc(it.stem)+'</div>'+
      '<div class="ox-row">'+
        '<button class="btn ox-o" data-ans="1">○ 正しい</button>'+
        '<button class="btn ox-x" data-ans="0">✕ 誤り</button>'+
      '</div>';
    $('#lesX').onclick=()=>{ if(confirm('レッスンを中断しますか？')) go('today'); };
    scr.querySelectorAll('[data-ans]').forEach(b=>{
      b.onclick=()=>answer(b.dataset.ans==='1', it);
    });
  }
  function answer(userSaysTrue, it){
    if(lesson.locked) return;   // 二重採点・連打ガード（回答済みなら無視）
    lesson.locked=true;
    const correct = (userSaysTrue === (it.answer===true));
    lesson.answers.push({id:it.id, correct, unit:it.unit});
    if(correct) lesson.correct++;
    if(!lesson.isDiag){
      SRS.grade(it.id, correct, todayISO());
      addXP(correct?2:0);
    }
    if(correct) Sound.correct(); else Sound.wrong();
    showFeedback(correct, it);
  }
  function showFeedback(correct, it){
    const old=document.querySelector('.feedback'); if(old) old.remove();
    const fb=document.createElement('div');
    fb.className='feedback '+(correct?'ok':'ng');
    fb.innerHTML=
      '<div class="head">'+(correct?'✅ 正解！':'❌ 不正解')+'</div>'+
      pointLine(it)+
      '<div class="exp">'+(it.explanation?esc(it.explanation):(correct?'その通り。':'解説準備中。'))+'</div>'+
      revNote(it)+
      '<button class="btn'+(correct?'':' red')+'" id="fbNext">つづける</button>';
    document.body.appendChild(fb);
    $('#fbNext').onclick=()=>{ fb.remove(); lesson.idx++; renderQuestion(); };
  }
  function renderComplete(){
    const scr=$('#scr-lesson');
    const total=lesson.queue.length, ok=lesson.correct;

    if(lesson.isDiag){
      finishDiag();

      scr.innerHTML='<div class="complete">'+catSVG(mood)+

        '<div style="margin-top:16px"><button class="btn" onclick="App.UI.go(\'path\')">パスを見る</button></div></div>';
      celebrateBurst();
      return;
    }
    // レッスン完了 +10XP
    earned = ok*2 + 10; // (回答時に個別+2は既加算) ここでは表示用に+10のみ加算
    addXP(10);
    if(ok===total){ line=catLine('complete'); }
    else if(ok===0){ mood='sad'; line=catLine('wrong'); }
    else { line=catLine('complete'); }

    const streakHit = [3,7,14,30,50,100].includes(p.streak);
    if(streakHit){ line=catLine('streak'); }
    scr.innerHTML='<div class="complete">'+catSVG(mood)+
      '<div class="cat-say">'+(crownMsg||line)+'</div>'+
      '<h2>レッスン完了！</h2>'+
      '<div class="xp-pill">✨ +'+(10)+' XP</div>'+
      '<div class="stat-grid">'+
        '<div class="c"><div class="v">'+ok+'/'+total+'</div><div class="l">正解</div></div>'+
        '<div class="c"><div class="v">'+Math.round(100*ok/total)+'%</div><div class="l">正答率</div></div>'+

  // 演出: レッスン完了時にハート/星をふわっと舞わせる（見た目のみ・ロジックに影響なし）
  function celebrateBurst(){
    const host=document.querySelector('.complete');
    if(!host) return;
    const wrap=document.createElement('div');
    wrap.className='confetti-wrap';
    const glyphs=['💗','⭐','🌸','✨'];
    for(let i=0;i<14;i++){

      s.className='confetti-piece';
      s.textContent=glyphs[Math.floor(Math.random()*glyphs.length)];
      s.style.left=(Math.random()*90+5)+'%';

  /* ---------------- 診断テスト ---------------- */
  function offerDiag(){
    const m=mode(), p=Store.profile();
    if(p.diagDone[m]) return;
    const items=Data.choicesForMode(m);
    if(items.length<5){ p.diagDone[m]=true; Store.saveProfile(); return; } // データ不足ならスキップ
    const ov=document.createElement('div');
    ov.className='overlay'; ov.id='diagOverlay';
    ov.innerHTML='<div class="modal">'+catSVG('hello')+
      '<h3>'+EXAM[m].label+' 診断テスト</h3>'+
      '<div class="muted">30肢であなたの現在地を測ります。正解した単元は「飛び級」して先から始められます。</div>'+
      '<div style="margin-top:16px"><button class="btn" id="diagStart">診断を受ける（30肢）</button>'+
      '<button class="btn gray" style="margin-top:10px" id="diagSkip">あとで / スキップ</button></div></div>';
    document.body.appendChild(ov);
    $('#diagStart').onclick=()=>{ ov.remove(); startDiag(m); };
    $('#diagSkip').onclick=()=>{ ov.remove(); p.diagDone[m]=true; Store.saveProfile(); };
  }
  function startDiag(m){
    // 各unitから均等サンプルで最大30肢
    const units=unitsForMode(m);
    const per=Math.max(1, Math.ceil(30/units.length));
    let picks=[];
    units.forEach(u=>{ picks=picks.concat(shuffle(Data.ofUnitType(u.id,'choice').map(i=>i.id)).slice(0,per)); });
    picks=shuffle(picks).slice(0,30);
    Sound.resume();
    lesson={ queue:picks, idx:0, correct:0, answers:[], meta:{label:'診断'}, isDiag:true };
    go('lesson'); renderQuestion();
  }
  function finishDiag(){
    const m=mode(), p=Store.profile(), t=todayISO();
    // unitごとに正解があれば飛び級
    const okUnits=new Set(lesson.answers.filter(a=>a.correct).map(a=>a.unit));
    okUnits.forEach(u=>SRS.seedUnit(u,t));
    // 診断で出た全itemは最低限seedしておく（未正解はbox1のまま）
    SRS.init(lesson.answers.map(a=>Data.get(a.id)).filter(Boolean), t);
    p.diagDone[m]=true; Store.saveProfile();
  }

  function gradeCard(g, it){
    if(cardState.mode==='kijutsu'){
      addXP(g==='o'?15:g==='t'?8:3);
      // ○=正解 / △=partial(正解扱い・昇格なし) / ✕=不正解 の3値grade
      if(it) SRS.grade(it.id, g==='o'?true:g==='t'?'partial':false, todayISO());
    }else{
      addXP(1);
      if(it) SRS.grade(it.id, g==='o', todayISO());
    }
    if(g==='x') Sound.wrong(); else Sound.correct();
    cardState.idx++; cardState.revealed=false;
    const total=(cardState.mode==='kijutsu'?Data.forMode(mode(),'kijutsu'):Data.forMode(mode(),'flash')).length;
    if(total && cardState.idx>=total){        // 一周した：黙ってループせず区切りを知らせる
      cardState.idx=0;
      toast('🌸 一周したニャ！おつかれさま');
    }
    renderCards();
  }

  function weekXpSvg(p){
    const t=todayISO();
    const days=[]; for(let i=6;i>=0;i--) days.push(addDays(t,-i));
    const thisW=days.map(d=>p.xpHistory[d]||0);
    const lastW=days.map(d=>p.xpHistory[addDays(d,-7)]||0);
    const max=Math.max(10, ...thisW, ...lastW);
    const W=300,H=120,pad=18,bw=(W-pad*2)/7;
    let bars='';
    days.forEach((d,i)=>{
      const x=pad+i*bw;
      const h1=(thisW[i]/max)*(H-30), h2=(lastW[i]/max)*(H-30);
      bars+='<rect x="'+(x+bw*0.18)+'" y="'+(H-20-h2)+'" width="'+(bw*0.3)+'" height="'+h2+'" fill="#d9c8d3" rx="2"/>';
      bars+='<rect x="'+(x+bw*0.5)+'" y="'+(H-20-h1)+'" width="'+(bw*0.3)+'" height="'+h1+'" fill="#267868" rx="2"/>';
      const wd=['日','月','火','水','木','金','土'][new Date(d+'T00:00:00').getDay()];
      bars+='<text x="'+(x+bw*0.4)+'" y="'+(H-6)+'" font-size="9" text-anchor="middle" fill="#73596a">'+wd+'</text>';
    });
    return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-height:130px">'+bars+'</svg>';
  }
  function doExport(){
    const data=Store.exportAll();
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='shikaku-backup-'+todayISO()+'.json'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('エクスポートしました');
  }
  function doImport(e){
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const obj=JSON.parse(r.result);
        Store.importAll(obj);
        toast('インポート完了。反映しました');
        renderHeader(); render('progress');
      }catch(err){ toast('インポート失敗: 不正なファイル'); }
    };
    r.readAsText(f);
  }

  /* ---------------- 共通UI ---------------- */
  function toast(msg){
    const old=document.querySelector('.toast'); if(old) old.remove();
    const el=document.createElement('div'); el.className='toast'; el.textContent=msg;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1800);
  }
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
  function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

  /* --- 出典バッジ（r2 §6.1 表示規約）。kind未定義→バッジ非表示（フォールバック） --- */
  function sourceBadge(it){
    if(!it || !it.kind) return '';          // メタ欠落時はバッジを出さない（エラーにしない）
    if(it.kind==='kakomon'){
      const yr = it.year ? '｜'+esc(it.year)+'相当' : '';
      const rev = (it.rev==='revised') ? '<span class="rev">法改正対応</span>' : '';
      return '<span class="src-badge kakomon">過去問ベース'+yr+rev+'</span>';
    }
    if(it.kind==='original'){
      return '<span class="src-badge original">オリジナル</span>';
    }
    return ''; // 未知kindも安全に非表示
  }
  // 論点行。point未定義→非表示（フォールバック）
  function pointLine(it){
    if(!it || !it.point) return '';
    return '<div class="point-line">論点: '+esc(it.point)+'</div>';
  }
  // 法改正注記（rev付きのみ）
  function revNote(it){
    if(!it || it.rev!=='revised') return '';
    return '<div class="rev-note">⚠️ 法改正で内容が変わった論点</div>';
  }

  function setMode(m){
    const p=Store.profile();
    if(p.mode===m) return;
    p.mode=m; Store.saveProfile();
    renderHeader(); render(curTab);
    offerDiag();
  }

  function init(){
    renderHeader();
    // tabbar / mode toggle
    document.querySelectorAll('#tabbar button').forEach(b=>b.onclick=()=>navTo(b.dataset.tab));
    document.querySelectorAll('#modeToggle button').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
    go('today');
    // 初回モードの診断オファー
    offerDiag();
  }

  return { init, go, render, addXP, toast, setMode, startMcq };
})();

/* ===========================================================================
   起動
   =========================================================================== */
async function boot(){
  Store.rollDate();
  const res=await Data.load();
  // 全itemにSRSレコードを遅延生成（既存進捗は保持）
  SRS.init(Data.all(), todayISO());
  UI.init();
}

return { Data, Store, SRS, Picker, UI, Sim, boot, _units:UNITS, _catSVG:catSVG };
})();

document.addEventListener('DOMContentLoaded', ()=>{ App.boot(); });
</script>
<script>
// ===== PWA: Service Worker登録（Issue 7） =====
// 対応ブラウザのみ・失敗してもアプリ本体の動作には影響させない
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js').catch(function(err){
      console.warn('[pwa] service worker registration failed:', err);
    });
  });
}
</script>
